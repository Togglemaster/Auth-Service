{{- if (index .Values "auth-service").autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: auth-service-hpa
  namespace: {{ (index .Values "auth-service").namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: app-auth-service
  minReplicas: {{ (index .Values "auth-service").autoscaling.minReplicas }}
  maxReplicas: {{ (index .Values "auth-service").autoscaling.maxReplicas }}
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: {{ (index .Values "auth-service").autoscaling.targetCPUUtilizationPercentage }}
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: {{ (index .Values "auth-service").autoscaling.targetMemoryUtilizationPercentage }}
{{- end }}
